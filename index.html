<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CineMatch</title>
    <link rel="stylesheet" href="./dist/output.css" />
    <script type="module" src="./src/script.js" defer></script>
    <style>
      body {
        background-image: radial-gradient(
                ellipse 80% 50% at 50% 0%,
                rgba(46, 33, 80, 0.6) 0%,
                transparent 70%
        );
      }

      body::before,
      body::after {
        content: "";
        position: fixed;
        top: 0;
        width: 32px;
        height: 100vh;
        pointer-events: none;
        z-index: 10;
        background:
                radial-gradient(
                        circle,
                        var(--color-dark-azul) 0 6px,
                        var(--color-dourado) 7px,
                        transparent 8px
                )
                center top / 32px 44px repeat-y;
        opacity: 0.4;
      }

      body::before {
        left: 12px;
      }

      body::after {
        right: 12px;
      }

      @media (max-width: 640px) {
        body::before,
        body::after {
          display: none;
        }
      }
      header h1{
        animation: animaSombra 2.4s infinite ease-in-out;
      }
      header h1 > svg{
        animation: animaBrilhoIcone 2.4s infinite ease-in-out;
      }

      @keyframes animaSombra {
        0%,100%{
          text-shadow:
                  0 0 4px var(--color-dourado),
                  0 0 10px var(--color-dourado),
                  0 0 18px var(--color-salmao);
        }
        50%{
          text-shadow:
                  0 0 2px var(--color-dourado),
                  0 0 6px var(--color-dourado),
                  0 0 10px var(--color-salmao);
        }
      }

      @keyframes animaBrilhoIcone {
        0%,
        100% {
          filter: drop-shadow(0 0 4px var(--color-dourado)) drop-shadow(0 0 10px var(--color-dourado)) drop-shadow(0 0 18px var(--color-salmao));
        }

        50% {
          filter: drop-shadow(0 0 2px var(--color-dourado)) drop-shadow(0 0 6px var(--color-dourado)) drop-shadow(0 0 10px var(--color-salmao));
        }
      }
    </style>
  </head>
  <body class="min-h-screen bg-dark-azul text-branco">
    <header>
      <h1 class="flex items-center justify-center gap-4 font-bebas text-6xl text-center py-4 text-dourado text-shadow-salmao text-shadow-md">
        CineMatch
        <svg xmlns="http://www.w3.org/2000/svg" width="58" height="58" class="fill-dourado" viewBox="0 0 256 256">
          <path d="M88,96l16,120H70.34a8,8,0,0,1-7.79-6.17L32,80Zm80,0L152,216h33.66a8,8,0,0,0,7.79-6.17L224,80Z" opacity="0.2"></path><path d="M229.52,74.21a8,8,0,0,0-7.13-2A44,44,0,0,0,168,41.67a44,44,0,0,0-80,0,44,44,0,0,0-54.4,30.51,8,8,0,0,0-9.4,9.65L54.76,211.67A16,16,0,0,0,70.34,224H185.66a16,16,0,0,0,15.58-12.33L231.79,81.83A8,8,0,0,0,229.52,74.21ZM76,56a27.68,27.68,0,0,1,13.11,3.26,8,8,0,0,0,11.56-5.34,28,28,0,0,1,54.66,0,8,8,0,0,0,11.56,5.34A28,28,0,0,1,207,76.54l-38.56,11-34.49-13.8a16,16,0,0,0-11.88,0L87.57,87.56,49,76.54A28,28,0,0,1,76,56Zm83.25,45.11L145,208H111L96.75,101.11,128,88.62ZM42.91,91.44l37.85,10.81L94.86,208H70.34ZM185.66,208H161.14l14.1-105.75,37.85-10.81Z">
        </path>
        </svg>
      </h1>
      <ul class="flex flex-wrap gap-4 sm:gap-6 items-center justify-center font-mono px-4">
        <li>
          <button class="group flex gap-2 cursor-pointer rounded-full border-2 border-light-roxo/50 hover:text-dourado bg-dark-roxo shadow-light-roxo transition-all duration-200 hover:shadow-[3px_3px_0_rgba(0,0,0,1)] py-2 px-6">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" class="fill-[#9a8fc0] group-hover:fill-dourado" viewBox="0 0 256 256"><path d="M192,112a80,80,0,1,1-80-80A80,80,0,0,1,192,112Z" opacity="0.2"></path><path d="M229.66,218.34,179.6,168.28a88.21,88.21,0,1,0-11.32,11.31l50.06,50.07a8,8,0,0,0,11.32-11.32ZM40,112a72,72,0,1,1,72,72A72.08,72.08,0,0,1,40,112Z"></path></svg> Buscar
          </button>
        </li>
        <li>
          <button class="group flex gap-2 cursor-pointer rounded-full border-2 border-light-roxo/50 hover:text-dourado bg-dark-roxo shadow-light-roxo transition-all duration-200 hover:shadow-[3px_3px_0_rgba(0,0,0,1)] py-2 px-6">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" class="fill-[#9a8fc0] group-hover:fill-dourado" viewBox="0 0 256 256"><path d="M216,64V192a24,24,0,0,1-24,24H64a24,24,0,0,1-24-24V64A24,24,0,0,1,64,40H192A24,24,0,0,1,216,64Z" opacity="0.2"></path><path d="M192,32H64A32,32,0,0,0,32,64V192a32,32,0,0,0,32,32H192a32,32,0,0,0,32-32V64A32,32,0,0,0,192,32Zm16,160a16,16,0,0,1-16,16H64a16,16,0,0,1-16-16V64A16,16,0,0,1,64,48H192a16,16,0,0,1,16,16Zm-96-92a12,12,0,1,1-12-12A12,12,0,0,1,112,100Zm56,0a12,12,0,1,1-12-12A12,12,0,0,1,168,100Zm-56,56a12,12,0,1,1-12-12A12,12,0,0,1,112,156Zm56,0a12,12,0,1,1-12-12A12,12,0,0,1,168,156Z"></path></svg>Roleta
          </button></li>
        <li>
          <button class="group flex gap-2 cursor-pointer rounded-full border-2 border-light-roxo/50 hover:text-dourado bg-dark-roxo shadow-light-roxo transition-all duration-200 hover:shadow-[3px_3px_0_rgba(0,0,0,1)] py-2 px-6">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" class="fill-[#9a8fc0] group-hover:fill-dourado" viewBox="0 0 256 256"><path d="M67.71,64.59l47.79,27.6L40.43,112,32.27,82a7.76,7.76,0,0,1,5.58-9.52ZM199.84,37.76a7.9,7.9,0,0,0-9.66-5.49L126.61,49.05,174.4,76.64,208,67.77Z" opacity="0.2"></path><path d="M216,104H102.09L210,75.51a8,8,0,0,0,5.68-9.84l-8.16-30a15.93,15.93,0,0,0-19.42-11.13L35.81,64.74a15.75,15.75,0,0,0-9.7,7.4,15.51,15.51,0,0,0-1.55,12L32,111.56c0,.14,0,.29,0,.44v88a16,16,0,0,0,16,16H208a16,16,0,0,0,16-16V112A8,8,0,0,0,216,104ZM192.16,40l6,22.07-22.62,6L147.42,51.83Zm-66.69,17.6,28.12,16.24-36.94,9.75L88.53,67.37Zm-79.4,44.62-6-22.08,26.5-7L94.69,89.4ZM208,200H48V120H208v80Z"></path></svg>Quiz
          </button>
        </li>
      </ul>

    </header>
    <main class="mx-auto flex min-h-screen max-w-6xl flex-col justify-center px-6">
      <form id="searchForm" class="mt-8 flex justify-center items-center gap-3 border-b-2 border-salmao/10 pb-4 px-4 sm:px-0">
        <input id="searchInput" type="search" placeholder="Busque por filme ou série" class="w-full max-w-[280px] sm:max-w-none sm:w-72 rounded-full bg-branco/10 border border-dourado/40 px-4 py-3 text-branco outline-none">
        <button type="submit" class="font-mono rounded-full bg-dourado border border-dourado/20 hover:brightness-120 hover:bg-dourado p-3 font-dados text-dourado hover:text-dark-azul cursor-pointer transition-all duration-200">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" class="fill-[#0B0B14] group-hover:fill-dourado" viewBox="0 0 256 256"><path d="M192,112a80,80,0,1,1-80-80A80,80,0,0,1,192,112Z" opacity="0.2"></path><path d="M229.66,218.34,179.6,168.28a88.21,88.21,0,1,0-11.32,11.31l50.06,50.07a8,8,0,0,0,11.32-11.32ZM40,112a72,72,0,1,1,72,72A72.08,72.08,0,0,1,40,112Z"></path></svg>
        </button>
      </form>
      <!--sessão de cards dos filmes-->
      <section class="mx-auto flex flex-col gap-6 min-h-screen max-w-6xl px-4 sm:px-6 mt-4">
        <!--filtros-->
        <div class="flex flex-col md:flex-row items-center justify-between gap-4 md:gap-8">
          <h1 class="font-bebas text-5xl sm:text-6xl text-dourado py-2 sm:py-4 text-center md:text-left">Resultados</h1>
          <ul class="flex flex-wrap justify-center gap-2 sm:gap-4">
            <li id="todos" class="text-lg sm:text-xl font-bebas text-salmao border border-branco/10 bg-branco/5 hover:border-salmao/50 backdrop-blur-lg px-4 sm:px-6 py-1 sm:py-2 rounded-full transition-all duration-200 cursor-pointer">Todos</li>
            <li id="filmes" class="text-lg sm:text-xl font-bebas text-salmao border border-branco/10 bg-branco/5 hover:border-salmao/50 backdrop-blur-lg px-4 sm:px-6 py-1 sm:py-2 rounded-full transition-all duration-200 cursor-pointer">Filmes</li>
            <li id="series" class="text-lg sm:text-xl font-bebas text-salmao border border-branco/10 bg-branco/5 hover:border-salmao/50 backdrop-blur-lg px-4 sm:px-6 py-1 sm:py-2 rounded-full transition-all duration-200 cursor-pointer">Séries</li>
          </ul>
        </div>
        <!--filmes-->
        <div id="containerFilmes" class="grid grid-cols-2 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 sm:gap-6 mt-4">
          <!-- Os cards dinâmicos serão inseridos aqui -->
        </div>
      </section>
    </main>
  </body>
</html>
